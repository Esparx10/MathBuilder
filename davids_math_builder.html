function generateProblem(level) {
  const types = [];
  if (level <= 3) types.push("add", "sub");
  else if (level <= 6) types.push("add", "sub", "mul");
  else types.push("add", "sub", "mul", "div");
  const type = types[Math.floor(Math.random() * types.length)];
  let a, b, answer, question;
  switch (type) {
    case "add":
      a = Math.floor(Math.random() * (30 * Math.min(level, 4))) + 5;
      b = Math.floor(Math.random() * (30 * Math.min(level, 4))) + 5;
      answer = a + b; question = `${a} + ${b}`; break;
    case "sub":
      a = Math.floor(Math.random() * (25 * Math.min(level, 4))) + 15;
      b = Math.floor(Math.random() * Math.min(a - 1, 30 * Math.min(level, 3))) + 1;
      answer = a - b; question = `${a} - ${b}`; break;
    case "mul":
      a = Math.floor(Math.random() * 8) + 2;
      b = Math.floor(Math.random() * (level > 7 ? 10 : 7)) + 2;
      answer = a * b; question = `${a} × ${b}`; break;
    case "div":
      b = Math.floor(Math.random() * 7) + 2;
      answer = Math.floor(Math.random() * 8) + 2;
      a = b * answer; question = `${a} ÷ ${b}`; break;
  }
  const options = [answer];
  while (options.length < 4) {
    const offset = Math.floor(Math.random() * 16) - 8;
    const wrong = answer + (offset === 0 ? (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 4) + 1) : offset);
    if (wrong > 0 && !options.includes(wrong)) options.push(wrong);
  }
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  return { question, answer, options };
}

// ─── House View ───
function HouseView({ partsBuilt }) {
  const total = HOUSE_PARTS.reduce((sum, p) => sum + p.blocks, 0);
  const built = Math.min(partsBuilt, total);
  let acc = 0;
  const pp = HOUSE_PARTS.map(p => { const start = acc; acc += p.blocks; const done = Math.max(0, Math.min(p.blocks, built - start)); return { ...p, done, complete: done >= p.blocks }; });
  return (
    <svg width="180" height="160" viewBox="0 0 180 160">
      <rect width="180" height="160" fill="#87CEEB" rx="8" />
      <circle cx="155" cy="22" r="16" fill="#FFD700" opacity="0.9" />
      <rect x="0" y="125" width="180" height="35" fill="#4CAF50" />
      {pp[0].done > 0 && <rect x="35" y="118" width="110" height="10" fill="#8B7355" stroke="#5D4E37" strokeWidth="1" opacity={pp[0].done / pp[0].total} />}
      {pp[1].done > 0 && <rect x="40" y={118 - (pp[1].done / pp[1].total) * 55} width="100" height={(pp[1].done / pp[1].total) * 55} fill="#E8D5B7" stroke="#C4A882" strokeWidth="1" />}
      {pp[2].done > 0 && (<>
        <rect x="50" y="76" width="20" height="18" rx="2" fill="#87CEEB" stroke="#5D4E37" strokeWidth="1.5" opacity={pp[2].done >= 1 ? 1 : 0.3} />
        {pp[2].done >= 1 && <><line x1="60" y1="76" x2="60" y2="94" stroke="#5D4E37" strokeWidth="0.8" /><line x1="50" y1="85" x2="70" y2="85" stroke="#5D4E37" strokeWidth="0.8" /></>}
        <rect x="110" y="76" width="20" height="18" rx="2" fill="#87CEEB" stroke="#5D4E37" strokeWidth="1.5" opacity={pp[2].done >= 2 ? 1 : 0.3} />
      </>)}
      {pp[3].done > 0 && (<><rect x="80" y="92" width="20" height="26" rx="2" fill="#8B4513" stroke="#5D3A1A" strokeWidth="1.5" />{pp[3].complete && <circle cx="96" cy="107" r="2" fill="#FFD700" />}</>)}
      {pp[4].done > 0 && <polygon points="25,65 90,28 155,65" fill="#CC3333" stroke="#991111" strokeWidth="1.5" opacity={pp[4].done / pp[4].total} />}
      {pp[5].done > 0 && <rect x="118" y="28" width="14" height="26" fill="#8B7355" stroke="#5D4E37" strokeWidth="1" opacity={pp[5].done / pp[5].total} />}
      {pp[6].done > 0 && (<>{pp[6].done >= 1 && <text x="12" y="143" fontSize="14">🌷</text>}{pp[6].done >= 2 && <text x="155" y="143" fontSize="14">🌻</text>}</>)}
      {pp[7].done > 0 && <ellipse cx="158" cy="143" rx={(pp[7].done / pp[7].total) * 16} ry={(pp[7].done / pp[7].total) * 7} fill="#4FC3F7" stroke="#0288D1" strokeWidth="1" opacity="0.85" />}
      <text x="90" y="156" textAnchor="middle" fontSize="8" fill="#2E7D32" fontWeight="bold" fontFamily="'Trebuchet MS', sans-serif">
        {built >= total ? "🏠 COMPLETE!" : `${built}/${total} blocks`}
      </text>
    </svg>
  );
}

            <div style={{ position: "absolute", bottom: "10px", right: "15px", fontSize: "20px" }}>🌲</div>

            <div style={{ display: "flex", justifyContent: "center", paddingTop: "30px", position: "relative", zIndex: 2 }}>

}

// ─── MAIN GAME ───
function DavidsMathBuilder() {
  const [screen, setScreen] = useState("title");
  const [level, setLevel] = useState(1);
  const [robux, setRobux] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [problem, setProblem] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [shake, setShake] = useState(false);
  const [houseBlocks, setHouseBlocks] = useState(0);
  const [unlockedPrizes, setUnlockedPrizes] = useState([PRIZES[0].name]);
  const [equippedItems, setEquippedItems] = useState([]);
  const [totalCorrect, setTotalCorrect] = useState(0);
  const [totalAnswered, setTotalAnswered] = useState(0);
  const [particles, setParticles] = useState([]);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [characterColor, setCharacterColor] = useState("#FFD700");
  const [streakMsg, setStreakMsg] = useState("");
  const [newPrizeAlert, setNewPrizeAlert] = useState(null);
  const particleId = useRef(0);

  const COLORS = ["#FFD700", "#FF6B6B", "#4ECDC4", "#45B7D1", "#96CEB4", "#FF69B4", "#9B59B6", "#2ECC71"];

  const spawnParticles = useCallback((x, y, emojis, count = 6) => {
    const newP = [];
    for (let i = 0; i < count; i++) {
      newP.push({
        id: particleId.current++, x: x + (Math.random() - 0.5) * 100, y,
        dy: -(Math.random() * 120 + 40), rot: Math.random() * 360, opacity: 1,
        size: Math.random() * 12 + 14, emoji: emojis[Math.floor(Math.random() * emojis.length)],
      });
    }
    setParticles(prev => [...prev, ...newP]);
    setTimeout(() => setParticles(prev => prev.filter(p => !newP.find(n => n.id === p.id))), 1200);
  }, []);

  const newProblem = useCallback(() => {
    setProblem(generateProblem(level));
    setFeedback(null);
    setSelectedAnswer(null);
    setStreakMsg("");
  }, [level]);

  useEffect(() => {
    if (screen === "game" && !problem) newProblem();
  }, [screen, problem, newProblem]);

  const handleAnswer = (chosen) => {
    if (feedback) return;
    setSelectedAnswer(chosen);
    setTotalAnswered(prev => prev + 1);

    if (chosen === problem.answer) {
      const streakBonus = streak >= 2 ? Math.min(streak * 3, 20) : 0;
      const earned = 15 + streakBonus + level * 2;
      setRobux(prev => prev + earned);
      const newStreak = streak + 1;
      setStreak(newStreak);
      setTotalCorrect(prev => prev + 1);
      setHouseBlocks(prev => prev + 1);
      if (newStreak > bestStreak) setBestStreak(newStreak);

      if (newStreak >= 3) {
        const idx = Math.min(newStreak, STREAK_MSGS.length - 1);
        setStreakMsg(STREAK_MSGS[idx]);
      }

      const msg = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
      setFeedback({ correct: true, msg, earned });
      spawnParticles(150, 180, ["⭐", "💰", "🔥", "✨", "🏆", "💪", "🎉"], 10);

      if ((totalCorrect + 1) % 5 === 0 && level < 10) {
        setTimeout(() => setLevel(prev => prev + 1), 600);
      }

      const newRobux = robux + earned;
      PRIZES.forEach(prize => {
        if (!unlockedPrizes.includes(prize.name) && newRobux >= prize.cost) {
          setUnlockedPrizes(prev => [...prev, prize.name]);
          setNewPrizeAlert(prize);
          setTimeout(() => spawnParticles(150, 80, ["🎁", "🎉", "🥳", "🌟", prize.icon], 12), 200);
          setTimeout(() => setNewPrizeAlert(null), 3000);
        }
      });

      setTimeout(newProblem, 1400);
    } else {
      setStreak(0);
      setStreakMsg("");
      setShake(true);
      const msg = WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)];
      setFeedback({ correct: false, msg });
      setTimeout(() => setShake(false), 400);
      setTimeout(() => { setFeedback(null); setSelectedAnswer(null); }, 1800);
    }
  };

  // ─── TITLE SCREEN ───
  if (screen === "title") {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
        fontFamily: "'Trebuchet MS', 'Segoe UI', sans-serif", padding: "20px", position: "relative", overflow: "hidden",
      }}>
        {[...Array(14)].map((_, i) => (
          <div key={i} style={{
            position: "absolute", width: 18 + Math.random() * 28, height: 18 + Math.random() * 28,
            background: COLORS[i % COLORS.length], borderRadius: "4px", border: "2px solid rgba(0,0,0,0.2)",
            left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%`,
            opacity: 0.12 + Math.random() * 0.12, transform: `rotate(${Math.random() * 45}deg)`,
            animation: `float${i % 3} ${3 + Math.random() * 4}s ease-in-out infinite`,
          }} />
        ))}
        <style>{`
          @keyframes float0 { 0%, 100% { transform: translateY(0) rotate(5deg); } 50% { transform: translateY(-20px) rotate(-5deg); } }
          @keyframes float1 { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-30px) rotate(10deg); } }
          @keyframes float2 { 0%, 100% { transform: translateY(0) rotate(15deg); } 50% { transform: translateY(-15px) rotate(-15deg); } }
          @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); } 50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); } }
          @keyframes titlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
          @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        `}</style>
        <div style={{ textAlign: "center", zIndex: 1, animation: "slideUp 0.6s ease-out" }}>
          <div style={{ fontSize: "16px", marginBottom: "6px", color: "#4ECDC4", letterSpacing: "3px", fontWeight: 700 }}>🧱 ROBLOX-STYLE 🧱</div>
          <h1 style={{
            fontSize: "clamp(26px, 7vw, 48px)", fontWeight: 900, margin: "0 0 4px",
            background: "linear-gradient(180deg, #FFD700 0%, #FF8C00 100%)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            filter: "drop-shadow(0 4px 8px rgba(0,0,0,0.4))", animation: "titlePulse 3s ease-in-out infinite",
          }}>DAVID'S MATH BUILDER</h1>
          <p style={{ color: "#a0c4ff", fontSize: "14px", margin: "0 0 20px", fontWeight: 500 }}>
            Solve math • Earn Robux • Win prizes • Build a house! 🏠
          </p>
          <div style={{ marginBottom: "18px" }}>
            <DavidCharacter color={characterColor} size={95} expression="happy" showName={true} />
          </div>
          <div style={{ color: "#a0c4ff", fontSize: "12px", marginBottom: "6px", fontWeight: 600 }}>Pick David's color:</div>
          <div style={{ display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap", marginBottom: "22px" }}>
            {COLORS.map(c => (
              <button key={c} onClick={() => setCharacterColor(c)} style={{
                width: 30, height: 30, borderRadius: "6px",
                border: characterColor === c ? "3px solid #fff" : "2px solid rgba(255,255,255,0.2)",
                background: c, cursor: "pointer", transition: "all 0.15s ease",
                transform: characterColor === c ? "scale(1.15)" : "scale(1)",
                boxShadow: characterColor === c ? `0 0 12px ${c}` : "none",
              }} />
            ))}
          </div>
          <button onClick={() => { setScreen("game"); newProblem(); }} style={{
            background: "linear-gradient(180deg, #4CAF50 0%, #388E3C 100%)",
            color: "white", border: "none", borderRadius: "12px", padding: "16px 48px",
            fontSize: "22px", fontWeight: 800, cursor: "pointer", letterSpacing: "1px",
            boxShadow: "0 6px 0 #2E7D32, 0 8px 20px rgba(0,0,0,0.3)", animation: "glow 2s ease-in-out infinite",
          }}
            onMouseDown={e => e.currentTarget.style.transform = "translateY(3px)"}
            onMouseUp={e => e.currentTarget.style.transform = "translateY(0)"}
          >▶ PLAY</button>
        </div>
      </div>
    );
  }

  // ─── PRIZE WORLD ───
  if (screen === "prizes") {
    return <PrizeWorld
      unlockedPrizes={unlockedPrizes} equippedItems={equippedItems}
      setEquippedItems={setEquippedItems} robux={robux}
      characterColor={characterColor} setScreen={setScreen}
    />;
  }

  // ─── GAME SCREEN ───
  const totalHouseBlocks = HOUSE_PARTS.reduce((s, p) => s + p.blocks, 0);
  const nextPrize = PRIZES.find(p => !unlockedPrizes.includes(p.name));

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
      fontFamily: "'Trebuchet MS', sans-serif", padding: "12px",
      position: "relative", overflow: "hidden",
      animation: shake ? "shakeAnim 0.3s ease" : "none",
    }}>
      <style>{`
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes davidJump {
          0% { transform: translateY(0) scale(1); }
          15% { transform: translateY(-40px) scale(1.1); }
          30% { transform: translateY(-55px) scale(1.15) rotate(-4deg); }
          50% { transform: translateY(-60px) scale(1.18) rotate(4deg); }
          70% { transform: translateY(-30px) scale(1.08) rotate(-2deg); }
          85% { transform: translateY(-10px) scale(1.03); }
          100% { transform: translateY(0) scale(1); }
        }
        @keyframes davidSad { 0%,100% { transform: translateY(0); } 25% { transform: translateX(-5px); } 50% { transform: translateY(4px); } 75% { transform: translateX(5px); } }
        @keyframes shakeAnim { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes prizeAlert { 0% { transform: scale(0) rotate(-10deg); opacity: 0; } 50% { transform: scale(1.1) rotate(3deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        @keyframes streakGlow { 0%,100% { text-shadow: 0 0 10px rgba(255,107,107,0.5); } 50% { text-shadow: 0 0 25px rgba(255,107,107,0.9); } }
        @keyframes nextPrizeBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
      `}</style>

      <Particles particles={particles} />

      {newPrizeAlert && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 100,
        }}>
          <div style={{
            background: "linear-gradient(135deg, #1a1a3e, #2a1a4e)", borderRadius: "20px", padding: "28px 36px",
            textAlign: "center", border: "3px solid #FFD700", animation: "prizeAlert 0.5s ease",
            boxShadow: "0 0 60px rgba(255,215,0,0.3)",
          }}>
            <div style={{ fontSize: "14px", color: "#4ECDC4", fontWeight: 700, marginBottom: "4px" }}>🎉🎉🎉</div>
            <div style={{ fontSize: "20px", fontWeight: 900, color: "#FFD700", marginBottom: "8px" }}>NEW PRIZE UNLOCKED!</div>
            <div style={{ fontSize: "56px", marginBottom: "8px" }}>{newPrizeAlert.icon}</div>
            <div style={{ fontSize: "22px", fontWeight: 900, color: "#fff" }}>{newPrizeAlert.name}</div>
            <div style={{ fontSize: "13px", color: "#a0c4ff", fontStyle: "italic", marginTop: "4px" }}>{newPrizeAlert.desc}</div>
            <div style={{ fontSize: "14px", color: "#4CAF50", fontWeight: 700, marginTop: "10px" }}>
              GREAT JOB DAVID!! 🥳🎊
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px", position: "relative", zIndex: 2, flexWrap: "wrap", gap: "6px" }}>
        <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
          <div style={{

          }}>💰 {robux}</div>
          <div style={{

            borderRadius: "8px", padding: "5px 10px", color: "#FF6B6B", fontWeight: 700, fontSize: "13px",

          }}>

                <div style={{
                  height: "100%", borderRadius: "6px", background: "#FFD700",
                  width: `${Math.min(100, (robux / nextPrize.cost) * 100)}%`, transition: "width 0.3s ease",
                }} />
              </div>
              <div style={{ color: "rgba(255,255,255,0.4)", fontSize: "9px" }}>
                {robux}/{nextPrize.cost} Robux ({Math.max(0, nextPrize.cost - robux)} to go!)
              </div>
            </div>
          </div>
        )}

        {problem && (
          <div style={{
            background: "rgba(255,255,255,0.06)", borderRadius: "16px", padding: "18px",
            width: "100%", textAlign: "center", border: "1px solid rgba(255,255,255,0.1)",
            animation: "popIn 0.3s ease", boxShadow: "0 8px 32px rgba(0,0,0,0.2)",
          }}>
            <div style={{
              fontSize: "clamp(26px, 7vw, 40px)", fontWeight: 900, color: "#fff",
              marginBottom: "14px", letterSpacing: "-1px",
            }}>{problem.question} = ?</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
              {problem.options.map((opt, i) => {
                const isSelected = selectedAnswer === opt;
                const isCorrectAnswer = opt === problem.answer;
                let bg = "linear-gradient(180deg, #3949AB, #283593)";
                let border = "1px solid rgba(255,255,255,0.15)";
                let shadow = "0 4px 0 #1A237E";
                if (feedback && isSelected && feedback.correct) {
                  bg = "linear-gradient(180deg, #4CAF50, #388E3C)"; border = "2px solid #66BB6A"; shadow = "0 4px 0 #2E7D32";
                } else if (feedback && isSelected && !feedback.correct) {
                  bg = "linear-gradient(180deg, #F44336, #D32F2F)"; border = "2px solid #EF5350"; shadow = "0 4px 0 #B71C1C";
                } else if (feedback && !feedback.correct && isCorrectAnswer) {
                  bg = "linear-gradient(180deg, #4CAF50, #388E3C)"; border = "2px solid #66BB6A"; shadow = "0 4px 0 #2E7D32";
                }
                return (
                  <button key={i} onClick={() => handleAnswer(opt)} style={{
                    background: bg, color: "#fff", border, borderRadius: "12px",
                    padding: "12px 6px", fontSize: "clamp(18px, 5vw, 24px)", fontWeight: 800,
                    cursor: feedback ? "default" : "pointer", boxShadow: shadow,
                    transition: "all 0.1s ease",
                    opacity: feedback && !isSelected && !isCorrectAnswer ? 0.35 : 1,
                  }}
                    onMouseDown={e => { if (!feedback) e.currentTarget.style.transform = "translateY(2px)"; }}
                    onMouseUp={e => e.currentTarget.style.transform = "translateY(0)"}
                  >{opt}</button>
                );
              })}
            </div>
            {feedback && (
              <div style={{
                marginTop: "12px", fontSize: "15px", fontWeight: 900,
                color: feedback.correct ? "#4CAF50" : "#FF5722",
                animation: "popIn 0.2s ease", lineHeight: "1.4",
              }}>
                <div>{feedback.msg}</div>
                {feedback.correct && (
                  <span style={{ color: "#FFD700", fontSize: "14px" }}>+{feedback.earned} Robux! 💰</span>
                )}
              </div>
            )}
          </div>
        )}

        <div style={{ display: "flex", gap: "14px", justifyContent: "center", color: "rgba(255,255,255,0.35)", fontSize: "11px" }}>
          <span>✅ {totalCorrect}/{totalAnswered}</span>
          <span>🏆 Best: {bestStreak}</span>
          <span>🎁 {unlockedPrizes.length}/{PRIZES.length}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DavidsMathBuilder />);
  </script>
</body>
</html>
